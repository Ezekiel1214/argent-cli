name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:vitest
      - run: npm run smoke
      - run: npm pack --dry-run
